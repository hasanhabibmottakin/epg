name: Generate Daily EPG

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-epg:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Run EPG Script
        env:
          EPG_API_URL: ${{ secrets.EPG_API_URL }}
        run: python main.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          if [ -f epg_jtv_ind.xml.gz ]; then git add epg_jtv_ind.xml.gz; fi
          if [ -f epg_jtv_bd.xml.gz ]; then git add epg_jtv_bd.xml.gz; fi
          
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update daily JTV EPG data" && git push)
